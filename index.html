<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISH×TECH HACKATHON</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 背景のグラデーションカラー（黒〜深海） */
            --ocean-dark: #000B18;
            --ocean-mid: #002244;
            --ocean-light: #004477;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(to bottom, var(--ocean-dark) 0%, var(--ocean-mid) 60%, var(--ocean-light) 100%);
            background-attachment: fixed; /* スクロールしても背景を固定 */
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        .font-eng {
            font-family: 'Montserrat', sans-serif;
        }

        /* -------------------------
           海の背景とエフェクト 
           ------------------------- */
        .ocean-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* 光の波紋 */
        .caustics {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: transparent;
            background-image: radial-gradient(rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 60px 60px;
            opacity: 0.5;
            animation: wave 25s linear infinite;
            pointer-events: none;
        }

        @keyframes wave {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(3deg); }
        }

        /* 泡のエフェクト */
        .bubble {
            position: absolute;
            bottom: -100px;
            background-color: rgba(255, 255, 255, 1);
            border-radius: 50%;
            animation: rise infinite linear;
            box-shadow: inset -2px -2px 10px rgba(0, 0, 0, 0.2), 0 0 5px rgba(255, 255, 255, 0.3);
        }

        @keyframes rise {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-50vh) translateX(30px) scale(1.1); }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(-20px) scale(1.2); opacity: 0; }
        }

        /* 小さな海の生き物たち */
        .sea-creature {
            position: absolute;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .swim-left { animation: swimL linear infinite; right: -50px; }
        .swim-right { animation: swimR linear infinite; left: -50px; transform: scaleX(-1); }

        @keyframes swimL {
            0% { right: -50px; transform: translateY(0px); }
            25% { transform: translateY(15px); }
            50% { transform: translateY(0px); }
            75% { transform: translateY(-15px); }
            100% { right: 110vw; transform: translateY(0px); }
        }

        @keyframes swimR {
            0% { left: -50px; transform: scaleX(-1) translateY(0px); }
            25% { transform: scaleX(-1) translateY(-15px); }
            50% { transform: scaleX(-1) translateY(0px); }
            75% { transform: scaleX(-1) translateY(15px); }
            100% { left: 110vw; transform: scaleX(-1) translateY(0px); }
        }

        /* -------------------------
           コンテンツスタイル
           ------------------------- */
        .text-glow {
            text-shadow: 0 0 10px rgba(0, 153, 255, 0.8), 0 0 30px rgba(0, 51, 102, 0.9);
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* モーダル用iframeラッパー */
        .iframe-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 120px);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        
        .iframe-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* 起動時の魚群エフェクト用 */
        .splash-fish {
            position: absolute;
            opacity: 0;
            animation: swarmSwim linear forwards;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        @keyframes swarmSwim {
            0% { transform: translateX(var(--startX)) translateY(var(--startY)) scaleX(var(--dir)); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(var(--endX)) translateY(var(--endY)) scaleX(var(--dir)); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- 背景装飾 -->
    <div class="ocean-bg">
        <div class="caustics"></div>
        <div id="bubbles-container"></div>
        <div id="sea-creatures-container"></div>
    </div>

    <!-- スプラッシュスクリーン -->

        <div id="splash-fishes-container" class="absolute inset-0 overflow-hidden pointer-events-none z-40"></div>
        
        <!-- ロゴとテキスト -->
        <!-- duration-[4000ms] で4秒かけてゆっくりフェードイン -->
        <img src="./images/fishtech.png" alt="FISH×TECH" class="max-w-[80%] md:max-w-md opacity-0 transition-opacity duration-[4000ms] drop-shadow-2xl z-50 relative" id="splash-logo" onerror="this.style.display='none'">

            画面をタップしてスタート
        </p>
    </div>

    <!-- メインコンテンツ (初期状態は透明かつクリック不可) -->
    <main id="main-content" class="relative z-10 container mx-auto px-4 py-16 max-w-5xl opacity-0 transition-opacity duration-1000 pointer-events-none flex flex-col min-h-screen">
        
        <div class="flex-grow">
            <!-- ヘッダー -->
            <header class="text-center mb-16">
                <h1 class="text-5xl md:text-7xl font-black text-white tracking-widest font-eng text-glow">
                    FISH<span class="text-cyan-300">×</span>TECH
                </h1>
                <p class="text-cyan-100 text-xl md:text-2xl mt-4 font-bold tracking-widest drop-shadow-md">
                    HACKATHON
                </p>
            </header>

            <!-- タイムライン / リストコンテナ -->
            <div class="space-y-16">
                
                <!-- プログラムセクション -->
                <section>
                    <div class="flex items-center gap-3 mb-8 border-b-2 border-cyan-500 pb-2">
                        <h2 class="text-3xl md:text-4xl font-bold text-white tracking-wider">プログラム</h2>
                    </div>
                    <!-- JSでコンテンツを流し込む場所 -->
                    <div id="program-list" class="space-y-6"></div>
                </section>

                <!-- 参加チームセクション -->
                <section>
                    <div class="flex items-center gap-3 mb-8 border-b-2 border-yellow-500 pb-2">
                        <h2 class="text-3xl md:text-4xl font-bold text-white tracking-wider">参加チーム</h2>
                    </div>
                    <!-- グリッドレイアウトでチームを並べる -->
                    <div id="team-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </section>

            </div>
        </div>

        <!-- フッター -->
        <footer class="mt-24 pb-8 flex flex-col items-center justify-center text-center opacity-70">
            <img src="./images/opendatalogo.png" alt="Open Data Logo" class="h-16 mb-6" onerror="this.style.display='none'">
            <p class="text-sm tracking-widest text-white/50 mb-2">主催：石川県（IUDC）、金沢市</p>
            <p class="text-sm tracking-widest text-white/50">FISH×TECH HACKATHON</p>
        </footer>
    </main>

    <!-- PDF表示用モーダル -->
    <div id="pdf-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden transition-opacity duration-300 opacity-0">
        <div class="bg-gray-900 w-full max-w-5xl p-4 md:p-6 rounded-xl shadow-2xl mx-4 transform transition-transform duration-300 scale-95" id="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="text-xl md:text-2xl font-bold text-white truncate pr-4">Document</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors p-2 rounded-full hover:bg-gray-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="iframe-container">
                <div id="iframe-wrapper"></div>
            </div>
        </div>
    </div>

        /**
         * 🌊 背景アニメーションの初期化
         */
        function initBackground() {
            const bubblesContainer = document.getElementById('bubbles-container');
            const bubbleCount = 50; 
            
            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.classList.add('bubble');
                const size = Math.random() * 40 + 5; 
                const duration = 15 - (size / 50) * 8 + Math.random() * 10; 
                const opacity = Math.random() * 0.3 + 0.1;
                const left = Math.random() * 100;
                const delay = Math.random() * 15;

                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${left}%`;
                bubble.style.opacity = opacity;
                bubble.style.animationDuration = `${duration}s`;
                bubble.style.animationDelay = `-${delay}s`;

                bubblesContainer.appendChild(bubble);
            }

            const creaturesContainer = document.getElementById('sea-creatures-container');
            const creatures = ['🐟', '🐠', '🐡', '🐙', '🦑', '🦀', '🦐', '🐢', '🦈', '🐬'];
            
            for (let i = 0; i < 12; i++) {
                const creature = document.createElement('div');
                creature.className = 'sea-creature';
                creature.innerText = creatures[Math.floor(Math.random() * creatures.length)];
                creature.style.top = `${10 + Math.random() * 80}%`;
                creature.style.animationDuration = `${25 + Math.random() * 20}s`;
                creature.style.animationDelay = `${Math.random() * -30}s`; 
                
                if (Math.random() > 0.5) {
                    creature.classList.add('swim-right');
                } else {
                    creature.classList.add('swim-left');
                }
                
                const scale = 0.5 + Math.random() * 0.6;
                creature.style.fontSize = `${scale * 1.5}rem`;
                creature.style.opacity = 0.15 + Math.random() * 0.3;
                
                creaturesContainer.appendChild(creature);
            }
        }

        /**
         * 🐟 起動時のインパクト：総合優勝発表風の大群エフェクト
         */
        function initSplashFishes() {
            const container = document.getElementById('splash-fishes-container');
            container.innerHTML = '';
            
            const fishTypes = ['🐟', '🐠', '🦈', '🐋', '🦑', '🐡', '🐟', '🎉', '❤', '🐚'];
            const count = 120; // 画面を覆う魚の数
            
            for (let i = 0; i < count; i++) {
                const fish = document.createElement('div');
                fish.className = 'splash-fish';
                fish.innerText = fishTypes[Math.floor(Math.random() * fishTypes.length)];
                
                const isRightToLeft = Math.random() > 0.5;
                const dir = isRightToLeft ? -1 : 1;
                
                const startX = isRightToLeft ? '120vw' : '-20vw';
                const endX = isRightToLeft ? '-20vw' : '120vw';
                const startY = `${Math.random() * 100}vh`;
                const endY = `calc(${startY} + ${Math.random() * 60 - 30}vh)`;
                
                const duration = Math.random() * 3.5 + 2.5; 
                const delay = Math.random() * 4.0; 
                const fontSize = Math.random() * 6 + 3; 

                fish.style.setProperty('--startX', startX);
                fish.style.setProperty('--endX', endX);
                fish.style.setProperty('--startY', startY);
                fish.style.setProperty('--endY', endY);
                fish.style.setProperty('--dir', dir);
                
                fish.style.fontSize = `${fontSize}rem`;
                fish.style.animationDuration = `${duration}s`;
                fish.style.animationDelay = `${delay}s`;
                
                fish.style.zIndex = fontSize < 5 ? 40 : 60;

                container.appendChild(fish);
            }
            
            // アニメーション終了後に要素をクリア
            setTimeout(() => {
                container.innerHTML = '';
            }, 10000);
        }

        /**
         * 📝 カードのレンダリング
         */
        function renderContent() {
            const programContainer = document.getElementById('program-list');
            const teamContainer = document.getElementById('team-list');

            const createCardHTML = (data) => {
                const isProgram = data.type === 'program';
                const badgeColor = isProgram ? 'bg-cyan-500' : 'bg-yellow-500';
                
                const onClickAttr = data.pdfUrl ? `onclick="openModal('${data.title}', '${data.pdfUrl}')"` : '';
                const cursorClass = data.pdfUrl ? 'cursor-pointer hover:shadow-[0_10px_30px_rgba(0,153,255,0.2)] hover:border-[rgba(255,255,255,0.3)] hover:-translate-y-1 hover:bg-[rgba(255,255,255,0.15)]' : 'cursor-default opacity-70';

                // 時間が存在する場合のみ時間タグを追加
                const timeHtml = data.time ? `<p class="text-cyan-200 font-bold mb-1 tracking-wider text-sm">${data.time}</p>` : '';

                return `
                    <div class="card-glass rounded-2xl p-4 flex flex-col sm:flex-row gap-5 transition-all duration-300 ${cursorClass}" ${onClickAttr}>
                        <div class="w-full sm:w-48 h-36 flex-shrink-0 relative bg-white/5 rounded-xl flex items-center justify-center overflow-hidden border border-white/10">
                            <!-- onerrorで画像を隠し、代わりにNo Imageテキストを表示する -->
                            <img src="${data.image}" alt="${data.title}" class="w-full h-full object-cover absolute inset-0 z-10" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <span style="display:none;" class="text-white/30 font-bold tracking-widest z-0 text-sm">No Image...</span>
                        </div>
                        <div class="flex flex-col justify-center flex-grow py-2">
                            <span class="inline-block px-3 py-1 rounded-full text-xs font-bold text-white ${badgeColor} w-max mb-3 tracking-wider">
                                ${data.label}
                            </span>
                            ${timeHtml}
                            <h3 class="text-2xl font-bold text-white mb-2">${data.title}</h3>
                        </div>
                    </div>
                `;
            };

            programContainer.innerHTML = PROGRAM_DATA.map(createCardHTML).join('');
            teamContainer.innerHTML = TEAM_DATA.map(createCardHTML).join('');
        }


        /**
         * 🚀 スプラッシュ画面制御
         */
        function startApp() {
            const splashScreen = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            
            // タップされたらフェードアウト開始
            splashScreen.classList.add('opacity-0');
            
            setTimeout(() => {
                splashScreen.style.display = 'none';
                mainContent.classList.remove('opacity-0');
                mainContent.classList.remove('pointer-events-none');
                document.body.style.overflow = ''; // スクロール再開
            }, 1000); // 1秒かけてフェードアウト
        }


        /**
         * 📄 モーダル制御ロジック
         */
        const modal = document.getElementById('pdf-modal');
        const modalContent = document.getElementById('modal-content');
        const modalTitle = document.getElementById('modal-title');
        const iframeWrapper = document.getElementById('iframe-wrapper');

        function openModal(title, pdfUrl) {
            modalTitle.innerText = title;
            iframeWrapper.innerHTML = `<iframe src="${pdfUrl}" allow="autoplay"></iframe>`;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
            
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                iframeWrapper.innerHTML = ''; 
                document.body.style.overflow = ''; 
            }, 300);
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });


        /**
         * 🚀 初期化
         */
        window.onload = () => {
            // スプラッシュ画面中はスクロールを無効化
            document.body.style.overflow = 'hidden';
            
            initBackground();
            renderContent();
            initSplashFishes(); // 大群が横切るエフェクトを準備

            // ロゴをゆっくりフェードイン (duration-[4000ms])
            setTimeout(() => {
                document.getElementById('splash-logo').classList.remove('opacity-0');
            }, 300);

            // ロゴが完全に表示される頃に、タップ指示テキストを表示
            setTimeout(() => {
                document.getElementById('splash-text').classList.remove('opacity-0');
            }, 3500);
        };

    </script>
</body>
</html>
